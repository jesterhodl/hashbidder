name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Format check
        run: uv run ruff format --check .

      - name: Import sort check
        run: uv run ruff check --select I .

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy .

      - name: Test
        run: uv run pytest -v
